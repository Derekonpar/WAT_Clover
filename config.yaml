default_timezone: America/Chicago
default_currency_minor_unit: cents

api:
  base_url_env: CLOVER_BASE_URL
  merchant_id_env: CLOVER_MERCHANT_ID
  token_env: CLOVER_API_TOKEN

query_defaults:
  contains_match: true
  include_refunds_as_negative: true
  clover_category: Beer

# Sales + inventory line items (exact canonical names)
beer_line_items:
  - Angry Orchard
  - Blue Moon
  - Boat Show (Yellow Springs)
  - Bud Light
  - Busch Light
  - Coors Light
  - Guinness
  - High Noon Pineapple
  - Michelob Ultra
  - Miller Lite
  - Modelo
  - Truth
  - Yuengling

outputs:
  write_json: true
  write_csv: true
  output_dir: data
  logs_dir: logs

# Reorder emails — which distributor carries each SKU
distributors:
  bonbright:
    label: Bonbright
    beers:
      - Miller Lite
      - Guinness
      - Blue Moon
      - Coors Light
      - Modelo
  heidelberg:
    label: Heidelberg
    beers:
      - Michelob Ultra
      - Yuengling
      - Bud Light
      - Angry Orchard
      - High Noon Pineapple
      - Busch Light
      - Truth
  yellow_springs:
    label: Yellow Springs
    beers:
      - Boat Show (Yellow Springs)
